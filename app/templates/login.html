<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 | WW Hub Delivery Betting Pool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <h1>⚽ WORLD CUP 2026 ⚽<br><span style="font-size:0.7em; letter-spacing:0.05em;">WW Hub Delivery Betting Pool</span></h1>
        <div class="subtitle" style="font-size:3rem; letter-spacing:0.4rem;">🇺🇸 🇨🇦 🇲🇽</div>
    </div>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="login-box">
            <h2>Sign In</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="login">Your login (username)</label>
                    <input type="text" id="login" name="login"
                           placeholder="e.g. jsmith"
                           required autocomplete="username">
                </div>
                <div class="form-group" id="password-group" style="display:none;">
                    <label for="password">Admin Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Enter admin password"
                           autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Enter</button>
            </form>
            <p style="margin-top:1rem; font-size:0.75rem; color:var(--text-muted); text-align:center;">
                First time? Enter your login to register automatically.
            </p>
        </div>
    </div>
    <script>
    document.getElementById('login').addEventListener('input', function() {
        var pwGroup = document.getElementById('password-group');
        pwGroup.style.display = this.value.trim().toLowerCase() === 'admin' ? 'block' : 'none';
    });
    </script>
</body>
</html>
